<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morning Brief — {{DATE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,700;9..144,900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>

    /* ─── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface-2:   #1c2230;
      --border:      #21262d;
      --border-2:    #30363d;
      --muted:       #484f58;
      --subtle:      #7d8590;
      --body:        #b1bac4;
      --heading:     #e6edf3;
      --accent:      #4493f8;
      --accent-dim:  #1f3a5c;
      --up:          #3fb950;
      --up-dim:      #1a3a22;
      --down:        #f85149;
      --down-dim:    #3a1c1c;
      --warn:        #d29922;
      --warn-dim:    #3a2f0a;
      --purple:      #bc8cff;
      --purple-dim:  #2a1f3d;
      --radius:      6px;
      --radius-lg:   10px;
    }

    /* ─── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--body);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Layout ────────────────────────────────────────────────────── */
    .page { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
    .section { margin-bottom: 28px; }
    .section-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Masthead ───────────────────────────────────────────────────── */
    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .masthead-eyebrow {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .masthead-title {
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-size: clamp(28px, 5vw, 44px);
      color: var(--heading);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .masthead-right { text-align: right; }
    .masthead-date {
      font-size: 13px;
      font-weight: 500;
      color: var(--heading);
    }
    .masthead-generated {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .market-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      margin-top: 5px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── Market Mood card ───────────────────────────────────────────── */
    /*
     * COMPONENT: mood-card
     * Modifier classes: mood-bullish | mood-cautious | mood-mixed |
     *                   mood-risk-off | mood-neutral
     * Claude generates the inner HTML; Python slots it into {{MOOD}}.
     */
    .mood-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .mood-card::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .mood-bullish  { background: color-mix(in srgb, var(--up-dim) 40%, var(--surface)); }
    .mood-bullish::before  { background: var(--up); }
    .mood-cautious { background: color-mix(in srgb, var(--warn-dim) 40%, var(--surface)); }
    .mood-cautious::before { background: var(--warn); }
    .mood-mixed    { background: color-mix(in srgb, var(--accent-dim) 40%, var(--surface)); }
    .mood-mixed::before    { background: var(--accent); }
    .mood-risk-off { background: color-mix(in srgb, var(--down-dim) 40%, var(--surface)); }
    .mood-risk-off::before { background: var(--down); }
    .mood-neutral  { background: var(--surface); }
    .mood-neutral::before  { background: var(--muted); }

    .mood-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mood-label-group { display: flex; align-items: center; gap: 10px; }
    .mood-eyebrow {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .mood-indicator {
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .mood-bullish  .mood-indicator { color: var(--up); }
    .mood-cautious .mood-indicator { color: var(--warn); }
    .mood-mixed    .mood-indicator { color: var(--accent); }
    .mood-risk-off .mood-indicator { color: var(--down); }
    .mood-neutral  .mood-indicator { color: var(--subtle); }

    .mood-disclaimer {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      color: var(--muted);
    }
    .mood-summary {
      font-size: 14px;
      font-weight: 500;
      color: var(--heading);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .mood-drivers { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .mood-driver {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: var(--body);
    }
    .driver-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      margin-top: 6px;
    }

    /* ─── Economic indicator cards ───────────────────────────────────── */
    /*
     * FUTURE — ADDITIONAL MACRO DATA
     * Add FRED series IDs to FRED_SERIES in build_brief.py.
     * Each entry auto-generates a new card here.
     */
    .macro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }
    .macro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      transition: border-color 0.15s;
    }
    .macro-card:hover { border-color: var(--border-2); }
    .macro-card-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .macro-card-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--heading);
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .macro-card-date {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
    }
    .up   { color: var(--up);   font-size: 11px; }
    .down { color: var(--down); font-size: 11px; }
    .stale-badge {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      background: var(--warn-dim);
      color: var(--warn);
      border: 1px solid rgba(210,153,34,0.3);
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 3px;
    }

    /* ─── Signal cards (What Matters Most) ──────────────────────────── */
    /*
     * COMPONENT: signal-card
     * Claude fills each card with: headline, impact, categories,
     * explanation, and a source-placeholder block.
     */
    .signal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 10px;
    }
    .signal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .signal-card:hover { border-color: var(--border-2); }
    .signal-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    .impact-badge {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .impact-high   { background: var(--down-dim);   color: var(--down);   border: 1px solid rgba(248,81,73,0.25); }
    .impact-medium { background: var(--warn-dim);   color: var(--warn);   border: 1px solid rgba(210,153,34,0.25); }
    .impact-low    { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(68,147,248,0.25); }

    .signal-cats { display: flex; flex-wrap: wrap; gap: 4px; }
    .signal-cat {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      background: var(--surface-2);
      color: var(--subtle);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .signal-headline {
      font-size: 13px;
      font-weight: 600;
      color: var(--heading);
      line-height: 1.4;
    }
    .signal-explanation {
      font-size: 13px;
      color: var(--body);
      line-height: 1.55;
    }
    /* FUTURE — SOURCE CONNECTIONS
     * Replace .source-placeholder content with real source data.
     * Structure: source-name + source-url + source-date + source-fresh label.
     * See build_brief.py render_source_placeholder() when ready to connect. */
    .source-placeholder {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .source-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .source-value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: var(--subtle);
    }

    /* ─── Ticker analysis cards ──────────────────────────────────────── */
    /*
     * COMPONENT: ticker-card
     * Tone modifier classes: tone-bullish | tone-bearish |
     *                        tone-mixed | tone-neutral | tone-watch
     *
     * FUTURE — LIVE PRICE DATA
     * Add .ticker-price and .ticker-change spans to .ticker-card-header
     * once a price API is connected. See fetch_prices() placeholder
     * in build_brief.py.
     */
    .ticker-analysis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 10px;
    }
    .ticker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .ticker-card:hover { border-color: var(--border-2); }

    .ticker-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .ticker-card-id { display: flex; align-items: center; gap: 10px; }
    .ticker {
      display: inline-block;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      font-weight: 500;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(68,147,248,0.2);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .ticker-fullname {
      font-size: 12px;
      color: var(--subtle);
    }
    .tone-badge {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
      white-space: nowrap;
    }
    .tone-bullish { background: var(--up-dim);     color: var(--up);     border: 1px solid rgba(63,185,80,0.25); }
    .tone-bearish { background: var(--down-dim);   color: var(--down);   border: 1px solid rgba(248,81,73,0.25); }
    .tone-mixed   { background: var(--warn-dim);   color: var(--warn);   border: 1px solid rgba(210,153,34,0.25); }
    .tone-neutral { background: var(--surface-2);  color: var(--subtle); border: 1px solid var(--border); }
    .tone-watch   { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(188,140,255,0.25); }

    .ticker-card-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .ticker-why {
      font-size: 13px;
      color: var(--heading);
      font-weight: 500;
      line-height: 1.45;
    }
    .ticker-factors { display: flex; flex-direction: column; gap: 6px; }
    .ticker-factor {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 8px;
      align-items: baseline;
    }
    .factor-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .bull-label   { color: var(--up); }
    .bear-label   { color: var(--down); }
    .verify-label { color: var(--purple); }
    .factor-text  { font-size: 12px; color: var(--body); line-height: 1.5; }

    .ticker-source {
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    /* ─── Macro read (Claude text block) ────────────────────────────── */
    .macro-read {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .macro-read p {
      font-size: 13px;
      color: var(--body);
      line-height: 1.65;
      margin: 0;
    }

    /* ─── Raw news feed ──────────────────────────────────────────────── */
    /*
     * FUTURE — ADDITIONAL NEWS SOURCES
     * Add more render_ticker_block() calls in render_news_feed()
     * for earnings calendars, options flow, or X posts.
     */
    .ticker-block        { margin-bottom: 20px; }
    .ticker-block-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .news-list           { display: flex; flex-direction: column; gap: 6px; }
    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 13px;
      transition: border-color 0.15s;
    }
    .news-item:hover { border-color: var(--border-2); }
    .news-item-source {
      font-family: "IBM Plex Mono", monospace;
      font-size: 9px;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .news-item-headline {
      font-size: 13px;
      font-weight: 500;
      color: var(--heading);
      line-height: 1.4;
    }
    .news-item-headline a { color: inherit; }
    .news-item-headline a:hover { color: var(--accent); }
    .news-item-summary {
      font-size: 12px;
      color: var(--subtle);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* ─── Footer ─────────────────────────────────────────────────────── */
    /*
     * FUTURE — NEWSLETTER SIGNUP
     * Add an email input form here for daily delivery.
     */
    .footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .footer-disclaimer {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.7;
    }
    .footer-build {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
    }

    /* ─── Mobile ─────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .page { padding: 20px 14px 60px; }
      .masthead { flex-direction: column; align-items: flex-start; }
      .masthead-right { text-align: left; }
      .macro-grid { grid-template-columns: repeat(2, 1fr); }
      .signal-grid { grid-template-columns: 1fr; }
      .ticker-analysis-grid { grid-template-columns: 1fr; }
      .ticker-factor { grid-template-columns: 80px 1fr; }
      .footer { flex-direction: column; }
      .footer-build { text-align: left; }
      .mood-top { flex-direction: column; }
    }

  </style>
</head>
<body>
  <div class="page">

    <!-- ── Masthead ──────────────────────────────────────────────────── -->
    <header class="masthead">
      <div>
        <div class="masthead-eyebrow">Private Daily Brief</div>
        <h1 class="masthead-title">Morning Brief</h1>
      </div>
      <div class="masthead-right">
        <div class="masthead-date">{{DATE}}</div>
        <div class="masthead-generated">Generated {{GENERATED}}</div>
        <div id="market-status-live" class="market-status"></div>
      </div>
    </header>

    <!-- ── Market Mood card ──────────────────────────────────────────── -->
    <!--
      Generated by Claude. Positioned above economic data so you know
      the overall tone before drilling into numbers.
    -->
    {{MOOD}}

    <!-- ── Economic indicators ───────────────────────────────────────── -->
    <section class="section">
      <div class="section-label">Economic Indicators</div>
      {{MACRO}}
    </section>

    <!-- ── Signal cards + Ticker cards + Macro read ──────────────────── -->
    <!--
      FUTURE — CLAUDE SUMMARY
      Claude writes structured HTML into {{BRIEF}} using the component
      classes defined above. Each section uses a specific CSS class.
    -->
    <section class="section">
      {{BRIEF}}
    </section>

    <!-- ── Raw news feed ─────────────────────────────────────────────── -->
    <!--
      FUTURE — ADDITIONAL SOURCES
      Connect earnings calendar, options flow, X posts here.
    -->
    <section class="section">
      {{NEWS}}
    </section>

    <!-- ── Footer ────────────────────────────────────────────────────── -->
    <footer class="footer">
      <div class="footer-disclaimer">
        Research purposes only &mdash; not investment advice.<br>
        Auto-generated from public news feeds and FRED economic data.
      </div>
      <div class="footer-build">morning-brief &middot; {{DATE}}</div>
    </footer>

  </div>

  <script>
    // US market holidays 2026 — update each year
    const HOLIDAYS = new Set([
      "2026-01-01","2026-01-19","2026-02-16","2026-04-03",
      "2026-05-25","2026-07-03","2026-09-07","2026-11-26",
      "2026-11-27","2026-12-25"
    ]);

    function pad(n) { return String(n).padStart(2, "0"); }

    function getMarketStatus() {
      const now = new Date();
      const et  = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
      const h = et.getHours(), m = et.getMinutes(), s = et.getSeconds();
      const dow = et.getDay();
      const dateStr = [
        et.getFullYear(),
        pad(et.getMonth() + 1),
        pad(et.getDate())
      ].join("-");

      const totalSec = h * 3600 + m * 60 + s;
      const openSec  = 9 * 3600 + 30 * 60;
      const closeSec = 16 * 3600;
      const preSec   = 4 * 3600;

      function fmt(diff) {
        const hh = Math.floor(diff / 3600);
        const mm = Math.floor((diff % 3600) / 60);
        const ss = diff % 60;
        return `${hh}h ${pad(mm)}m ${pad(ss)}s`;
      }

      if (HOLIDAYS.has(dateStr))
        return { label: "Market Holiday", color: "var(--down)" };
      if (dow === 0 || dow === 6)
        return { label: "Weekend — market closed", color: "var(--down)" };
      if (totalSec >= openSec && totalSec < closeSec)
        return { label: `Market Open — closes in ${fmt(closeSec - totalSec)}`, color: "var(--up)" };
      if (totalSec >= preSec && totalSec < openSec)
        return { label: `Pre-Market — opens in ${fmt(openSec - totalSec)}`, color: "var(--warn)" };
      return { label: "Market Closed", color: "var(--down)" };
    }

    function tick() {
      const el = document.getElementById("market-status-live");
      if (!el) return;
      const { label, color } = getMarketStatus();
      el.innerHTML = `<span class="status-dot" style="background:${color}"></span>${label}`;
      el.style.color = color;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
