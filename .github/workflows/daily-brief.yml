name: Daily Brief

on:
  schedule:
    # 11:00 UTC on weekdays = ~6am ET (winter) / 7am ET (summer).
    # Adjust the hour if you want it earlier/later. Cron is always UTC.
    - cron: "0 11 * * 1-5"
  workflow_dispatch:   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the brief
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python build_brief.py

      - name: Publish updated page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update brief $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
